<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dvy-jp builds</title>
<meta name="description" id="meta-desc" content="Builds no oficiales de crDroid para Motorola Edge 50 Pro (eqe).">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='11' fill='%23161b22'/><line x1='18' y1='21' x2='15' y2='13' stroke='%233fb950' stroke-width='2.6' stroke-linecap='round'/><line x1='30' y1='21' x2='33' y2='13' stroke='%233fb950' stroke-width='2.6' stroke-linecap='round'/><path d='M10 33 A14 14 0 0 1 38 33 Z' fill='%233fb950'/><line x1='24' y1='20' x2='24' y2='29' stroke='%230d1117' stroke-width='3' stroke-linecap='round'/><path d='M19 25 L24 30 L29 25' fill='none' stroke='%230d1117' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
:root{
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2129;
  --line:#272e38; --line2:#333c48;
  --tx:#e6edf3; --tx2:#9aa7b4; --tx3:#6e7c8c;
  --ac:#4ea1ff; --ac2:#1f6feb;
  --ok:#3fb950; --warn:#d29922; --warnbg:#2b2413;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:72px}
body{
  background:var(--bg); color:var(--tx);
  font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
code{
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  font-size:.87em; background:var(--bg3); border:1px solid var(--line);
  padding:.15em .45em; border-radius:6px; color:#a5d6ff; word-break:break-all;
}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:820px;margin:0 auto;padding:0 20px}

/* ---------- header ---------- */
header{border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:100}
.hbar{display:flex;align-items:center;gap:16px;padding:14px 0;flex-wrap:wrap}
.brandwrap{display:inline-flex;align-items:center;gap:11px;text-decoration:none}
.brandwrap:hover{text-decoration:none}
.brand{font-weight:700;font-size:1.05rem;letter-spacing:-.2px;color:var(--tx)}
.brand span{color:var(--ac)}

/* logo con destello verde girando */
.logo-mark{
  position:relative;width:36px;height:36px;flex-shrink:0;
  border-radius:10px;background:var(--bg2);border:1px solid var(--line2);
  display:grid;place-items:center;
}
.logo-mark svg{width:26px;height:26px;display:block}
.logo-mark::before{
  content:"";position:absolute;inset:0;border-radius:inherit;padding:1.5px;pointer-events:none;
  background:conic-gradient(from var(--beam-angle),
    rgba(63,185,80,0) 0deg,
    rgba(63,185,80,0) 250deg,
    rgba(63,185,80,.4) 315deg,
    #7ee787 352deg,
    rgba(63,185,80,0) 360deg);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
          mask-composite:exclude;
  animation:beam-spin 3.5s linear infinite;
}
@media (prefers-reduced-motion:reduce){ .logo-mark::before{ animation:none } }
.hbar nav{display:flex;gap:18px;font-size:.9rem}
.hbar nav a{color:var(--tx2)}
.hbar nav a:hover{color:var(--tx);text-decoration:none}

/* ---------- selector de idioma ---------- */
.lang{
  margin-left:auto;display:inline-flex;align-items:center;
  background:var(--bg3);border:1px solid var(--line2);
  border-radius:999px;padding:3px;gap:2px;
}
.lang button{
  font-family:inherit;font-size:.74rem;font-weight:600;letter-spacing:.4px;
  background:transparent;border:0;color:var(--tx3);
  padding:5px 11px;border-radius:999px;cursor:pointer;transition:.15s;
}
.lang button:hover{color:var(--tx)}
.lang button[aria-pressed="true"]{background:var(--ac2);color:#fff}

/* ---------- hero ---------- */
.hero{padding:44px 0 40px;border-bottom:1px solid var(--line)}
.hero h1{font-size:2rem;line-height:1.2;letter-spacing:-.7px;margin-bottom:12px}
.hero p{color:var(--tx2);max-width:60ch}

/* icono de café discreto en el header */
.coffee{
  color:var(--tx3);font-size:1.05rem;line-height:1;text-decoration:none;
  padding:6px 9px;border-radius:8px;transition:.15s;
}
.coffee:hover{color:var(--tx);background:var(--bg3);text-decoration:none}

/* bloque de apoyo al pie */
.support{text-align:center;padding-bottom:26px;margin-bottom:24px;border-bottom:1px solid var(--line)}
.support:empty{display:none}
.sup-h{font-size:1rem;font-weight:600;color:var(--tx);margin-bottom:8px}
.sup-desc{color:var(--tx2);font-size:.9rem;line-height:1.6;max-width:54ch;margin:0 auto 16px}
.donate-sm{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--line2);background:var(--bg3);color:var(--tx);
  padding:9px 18px;border-radius:10px;font-size:.9rem;font-weight:600;transition:.15s;
}
.donate-sm:hover{background:#252c36;border-color:#3d4757;text-decoration:none}

/* ---------- dispositivos ---------- */
.devbar{display:flex;gap:8px;padding:20px 0 0;flex-wrap:wrap}
.devtab{
  background:var(--bg2);border:1px solid var(--line);color:var(--tx2);
  padding:8px 15px;border-radius:999px;font-size:.88rem;cursor:pointer;
  font-family:inherit;transition:.15s;
}
.devtab:hover{border-color:var(--line2);color:var(--tx)}
.devtab[aria-selected="true"]{background:var(--ac2);border-color:var(--ac2);color:#fff}

/* ---------- secciones ---------- */
section{padding:44px 0}
section+section{border-top:1px solid var(--line)}
h2{font-size:1.3rem;letter-spacing:-.3px;margin-bottom:6px}
.sub{color:var(--tx3);font-size:.9rem;margin-bottom:24px}

.devmeta{
  display:flex;gap:8px 22px;flex-wrap:wrap;
  color:var(--tx3);font-size:.85rem;margin-bottom:26px;
}
.devmeta b{color:var(--tx2);font-weight:500}

/* ---------- tarjetas de build ---------- */
.build{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r);margin-bottom:16px;overflow:hidden;
  position:relative;
}
.build>*{position:relative;z-index:1}
.build.is-latest{border-color:#2d4a6b}

/* destello verde recorriendo el borde — solo en la build Última */
@property --beam-angle{ syntax:"<angle>"; initial-value:0deg; inherits:false; }
.build.is-latest::before{
  content:"";position:absolute;inset:0;border-radius:inherit;padding:1.5px;z-index:0;
  pointer-events:none;
  background:conic-gradient(from var(--beam-angle),
    rgba(63,185,80,0) 0deg,
    rgba(63,185,80,0) 250deg,
    rgba(63,185,80,.35) 315deg,
    #7ee787 352deg,
    rgba(63,185,80,0) 360deg);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
          mask-composite:exclude;
  animation:beam-spin 3.5s linear infinite;
}
@keyframes beam-spin{ to{ --beam-angle:360deg; } }
@media (prefers-reduced-motion:reduce){ .build.is-latest::before{ animation:none } }
.bhead{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;cursor:pointer;user-select:none}
.bhead:hover{background:var(--bg3)}
.btitle{flex:1;min-width:0}
.btitle h3{font-size:1.05rem;font-weight:600;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.tag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 8px;border-radius:999px}
.tag.latest{background:rgba(63,185,80,.14);color:var(--ok);border:1px solid rgba(63,185,80,.3)}
.tag.variant{background:var(--bg3);color:var(--tx2);border:1px solid var(--line2)}
.bmeta{color:var(--tx3);font-size:.83rem;margin-top:5px}
.chev{color:var(--tx3);font-size:.8rem;transition:transform .2s;flex-shrink:0;margin-top:5px}
.build.open .chev{transform:rotate(180deg)}

.bbody{display:none;padding:0 20px 20px;border-top:1px solid var(--line)}
.build.open .bbody{display:block}
.bbody h4{font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin:20px 0 10px;font-weight:600}
.bbody ul{list-style:none}
.bbody ul li{position:relative;padding-left:20px;margin-bottom:7px;font-size:.93rem;color:var(--tx2)}
.bbody ul li::before{content:"";position:absolute;left:6px;top:.62em;width:5px;height:5px;border-radius:50%;background:var(--tx3)}

.files{display:flex;flex-direction:column;gap:6px;font-size:.85rem;color:var(--tx3)}
.files div{display:flex;gap:10px}
.files span:first-child{min-width:64px;color:var(--tx3)}
.files span:last-child{color:var(--tx2);word-break:break-all}

.dl{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{
  display:inline-block;padding:9px 18px;border-radius:9px;
  font-size:.9rem;font-weight:600;border:1px solid var(--line2);
  background:var(--bg3);color:var(--tx);transition:.15s;
}
.btn:hover{background:#252c36;text-decoration:none}
.btn.primary{background:var(--ac2);border-color:var(--ac2);color:#fff}
.btn.primary:hover{background:#2f81f7}
.btn.off{opacity:.45;pointer-events:none}

/* ---------- instalación ---------- */
.warn{
  background:var(--warnbg);border:1px solid rgba(210,153,34,.32);
  border-radius:var(--r);padding:15px 18px;margin-bottom:26px;
  font-size:.9rem;color:#e3c168;display:flex;gap:12px;
}
.warn b{color:var(--warn)}

.panel{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px}
.panel>h3{font-size:1rem;margin-bottom:4px}
.panel>p.psub{color:var(--tx3);font-size:.86rem;margin-bottom:16px}
ol.steps{list-style:none;counter-reset:s}
ol.steps li{counter-increment:s;position:relative;padding-left:34px;margin-bottom:12px;font-size:.93rem;color:var(--tx2)}
ol.steps li::before{
  content:counter(s);position:absolute;left:0;top:1px;
  width:23px;height:23px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--line2);
  color:var(--tx2);font-size:.75rem;font-weight:600;
  display:grid;place-items:center;
}
ol.steps li b{color:var(--tx)}
.pnote{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:.85rem;color:var(--tx3)}
.reqs{list-style:none}
.reqs li{padding-left:22px;position:relative;font-size:.92rem;color:var(--tx2);margin-bottom:7px}
.reqs li::before{content:"→";position:absolute;left:0;color:var(--tx3)}

.tsp{border-bottom:1px solid var(--line);padding:14px 0}
.tsp:last-child{border-bottom:0}
.tsp b{display:block;font-size:.92rem;margin-bottom:4px}
.tsp p{font-size:.88rem;color:var(--tx2)}

/* ---------- créditos ---------- */
.cred{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}
.cred:last-child{border-bottom:0}
.cred>div{flex:1}
.cred b{font-size:.95rem}
.cred p{color:var(--tx2);font-size:.88rem;margin-top:3px}

/* ---------- formulario de contacto ---------- */
.cform{max-width:620px}
.cf-hp{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}
.cf-row{display:flex;gap:14px;flex-wrap:wrap}
.cf-row>.cf-field{flex:1;min-width:170px}
.cf-field{display:block;margin-bottom:16px}
.cf-field>span{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--tx)}
.cf-field input,.cf-field select,.cf-field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--line2);border-radius:9px;
  color:var(--tx);padding:10px 12px;font:inherit;font-size:.92rem;
}
.cf-field input:focus,.cf-field select:focus,.cf-field textarea:focus{outline:0;border-color:var(--ac2)}
.cf-field textarea{resize:vertical;min-height:120px;line-height:1.55}
.cf-hint{display:block;font-size:.78rem;color:var(--tx3);margin-top:5px}
.cf-foot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px}
.cf-send{
  font:inherit;font-size:.93rem;font-weight:600;border-radius:10px;padding:11px 26px;
  border:1px solid var(--ac2);background:var(--ac2);color:#fff;cursor:pointer;transition:.15s;
}
.cf-send:hover{background:#2f81f7}
.cf-send:disabled{opacity:.5;cursor:not-allowed}
.cf-status{font-size:.88rem}
.cf-status.ok{color:var(--ok)}
.cf-status.err{color:var(--err)}

footer{border-top:1px solid var(--line);background:var(--bg2);padding:32px 0;margin-top:20px}
footer p{color:var(--tx3);font-size:.85rem}
footer p+p{margin-top:8px}

.err{
  background:var(--warnbg);border:1px solid rgba(210,153,34,.32);
  border-radius:var(--r);padding:20px;color:#e3c168;font-size:.92rem;margin:40px 0;
}

@media (max-width:560px){
  .hero h1{font-size:1.6rem}
  .hbar{gap:10px 14px}
  .hbar nav{order:3;width:100%;gap:16px}
  .lang{margin-left:auto}
  section{padding:34px 0}
}
</style>
</head>
<body>

<header>
  <div class="wrap hbar">
    <a class="brandwrap" href="./" aria-label="dvy-jp builds - inicio">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <line x1="18" y1="21" x2="15" y2="13" stroke="#3fb950" stroke-width="2.6" stroke-linecap="round"/>
          <line x1="30" y1="21" x2="33" y2="13" stroke="#3fb950" stroke-width="2.6" stroke-linecap="round"/>
          <path d="M10 33 A14 14 0 0 1 38 33 Z" fill="#3fb950"/>
          <line x1="24" y1="20" x2="24" y2="29" stroke="#161b22" stroke-width="3" stroke-linecap="round"/>
          <path d="M19 25 L24 30 L29 25" fill="none" stroke="#161b22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand" id="brand">dvy-jp<span>/</span>builds</span>
    </a>
    <div class="lang" id="lang" role="group" aria-label="Idioma / Language / Idioma">
      <button data-l="es" type="button">ES</button>
      <button data-l="en" type="button">EN</button>
      <button data-l="pt" type="button">PT</button>
    </div>
    <nav id="nav"></nav>
    <a class="coffee" id="coffee" href="#" target="_blank" rel="noopener" title="Ko-fi" style="display:none">☕</a>
  </div>
</header>

<main id="app">
  <div class="wrap"><p style="padding:60px 0;color:var(--tx3)">…</p></div>
</main>

<footer>
  <div class="wrap">
    <div class="support" id="support"></div>
    <p id="foot-credit"></p>
    <p id="foot-disclaimer"></p>
  </div>
</footer>

<script>
/* ============================================================
   Textos de la interfaz (fijos, ya traducidos).
   El contenido que cambia mes a mes va en builds.json.
   ============================================================ */
const UI = {
  es: {
    navBuilds:"Builds", navFlash:"Instalación", navCredits:"Créditos",
    buildsSub:"Tocá una build para ver su registro de cambios y descargarla.",
    noBuilds:"Todavía no hay builds publicadas.",
    codename:"Codename", model:"Modelo", soc:"SoC",
    latest:"Última", changes:"Cambios", notes:"Notas", file:"Archivo",
    patchOf:p=>`parche de ${p}`,
    flashTitle:"Cómo instalarla", flashSub:"Leé todo antes de empezar.",
    warnLead:"Antes que nada.",
    reqTitle:"Lo que necesitás", reqSub:"Sin esto no arranques.",
    tsTitle:"Si algo sale mal", tsSub:"Los tropiezos más comunes.",
    credTitle:"Créditos", credSub:"Esto se apoya casi enteramente en trabajo ajeno.",
    navContact:"Contacto",
    contactTitle:"Contacto y reportes", contactSub:"¿Encontraste un bug o tenés una consulta? Escribime. No hace falta cuenta.",
    cType:"Tipo", cTypeBug:"Reporte de bug", cTypeGen:"Consulta general",
    cBuild:"Build", cBuildNA:"No aplica / otra",
    cEmail:"Tu email (opcional)", cEmailHint:"Solo si querés que te responda.",
    cMsg:"Mensaje", cMsgPh:"Contame qué pasa. Si es un bug, incluí los pasos para reproducirlo.",
    cSend:"Enviar", cSending:"Enviando…", cSent:"¡Gracias! Tu mensaje fue enviado.", cErr:"No se pudo enviar. Probá de nuevo en un rato.",
    disclaimer:"Proyecto personal y sin fines de lucro. No afiliado a crDroid, Motorola ni Google.",
    loadErr:"No se pudo cargar builds.json",
    loadHint:"Si abriste el archivo con doble clic, el navegador bloquea la lectura del JSON. Levantá un servidor local con <code>python3 -m http.server</code> y entrá a <code>http://localhost:8000</code>."
  },
  en: {
    navBuilds:"Builds", navFlash:"Install", navCredits:"Credits",
    buildsSub:"Tap a build to see its changelog and download it.",
    noBuilds:"No builds published yet.",
    codename:"Codename", model:"Model", soc:"SoC",
    latest:"Latest", changes:"Changes", notes:"Notes", file:"File",
    patchOf:p=>`${p} security patch`,
    flashTitle:"How to install", flashSub:"Read everything before you start.",
    warnLead:"First things first.",
    reqTitle:"What you need", reqSub:"Don't start without this.",
    tsTitle:"If something goes wrong", tsSub:"The most common snags.",
    credTitle:"Credits", credSub:"This rests almost entirely on other people's work.",
    navContact:"Contact",
    contactTitle:"Contact & reports", contactSub:"Found a bug or have a question? Drop me a message. No account needed.",
    cType:"Type", cTypeBug:"Bug report", cTypeGen:"General question",
    cBuild:"Build", cBuildNA:"N/A · other",
    cEmail:"Your email (optional)", cEmailHint:"Only if you'd like a reply.",
    cMsg:"Message", cMsgPh:"Tell me what's going on. For a bug, include steps to reproduce it.",
    cSend:"Send", cSending:"Sending…", cSent:"Thanks! Your message was sent.", cErr:"Couldn't send. Please try again later.",
    disclaimer:"Personal, non-commercial project. Not affiliated with crDroid, Motorola or Google.",
    loadErr:"Could not load builds.json",
    loadHint:"If you opened the file by double-clicking it, the browser blocks reading the JSON. Start a local server with <code>python3 -m http.server</code> and open <code>http://localhost:8000</code>."
  },
  pt: {
    navBuilds:"Builds", navFlash:"Instalação", navCredits:"Créditos",
    buildsSub:"Toque numa build para ver o changelog e baixá-la.",
    noBuilds:"Ainda não há builds publicadas.",
    codename:"Codename", model:"Modelo", soc:"SoC",
    latest:"Mais recente", changes:"Mudanças", notes:"Notas", file:"Arquivo",
    patchOf:p=>`patch de ${p}`,
    flashTitle:"Como instalar", flashSub:"Leia tudo antes de começar.",
    warnLead:"Antes de mais nada.",
    reqTitle:"O que você precisa", reqSub:"Não comece sem isto.",
    tsTitle:"Se algo der errado", tsSub:"Os tropeços mais comuns.",
    credTitle:"Créditos", credSub:"Isto se apoia quase inteiramente no trabalho de outras pessoas.",
    navContact:"Contato",
    contactTitle:"Contato e relatos", contactSub:"Achou um bug ou tem uma dúvida? Me manda uma mensagem. Sem precisar de conta.",
    cType:"Tipo", cTypeBug:"Relato de bug", cTypeGen:"Dúvida geral",
    cBuild:"Build", cBuildNA:"N/A · outra",
    cEmail:"Seu email (opcional)", cEmailHint:"Só se quiser resposta.",
    cMsg:"Mensagem", cMsgPh:"Conta o que está acontecendo. Se for um bug, inclua os passos para reproduzir.",
    cSend:"Enviar", cSending:"Enviando…", cSent:"Obrigado! Sua mensagem foi enviada.", cErr:"Não foi possível enviar. Tente de novo mais tarde.",
    disclaimer:"Projeto pessoal e sem fins lucrativos. Não afiliado à crDroid, Motorola ou Google.",
    loadErr:"Não foi possível carregar builds.json",
    loadHint:"Se você abriu o arquivo com duplo clique, o navegador bloqueia a leitura do JSON. Suba um servidor local com <code>python3 -m http.server</code> e acesse <code>http://localhost:8000</code>."
  }
};
const LOCALE = { es:"es-UY", en:"en-US", pt:"pt-BR" };
const LANGS = ["es","en","pt"];

/* ---------- idioma ---------- */
function initialLang(){
  try{ const s = localStorage.getItem("lang"); if(LANGS.includes(s)) return s; }catch(e){}
  const n = (navigator.language || "es").slice(0,2).toLowerCase();
  return LANGS.includes(n) ? n : "es";
}
let lang = initialLang();
let DATA = null, current = 0;

/* tr(): acepta un texto simple (se muestra igual en los tres idiomas)
   o un objeto {es,en,pt}. Si falta un idioma, cae al español. */
function tr(v){
  if(v == null) return "";
  if(typeof v === "string") return v;
  return v[lang] ?? v.es ?? v[LANGS.find(l => v[l])] ?? "";
}
function trArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v.map(tr);
  const a = v[lang] ?? v.es ?? [];
  return Array.isArray(a) ? a : [];
}

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
/* Los pasos de instalación admiten <b> y <code> a propósito: es contenido propio. */
const rich = s => String(s ?? "");

const parseISO = iso => {
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || "");
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
};
const fmtDate = iso => {
  const d = parseISO(iso);
  return d ? d.toLocaleDateString(LOCALE[lang], {day:"numeric", month:"long", year:"numeric"}) : (iso || "");
};
const fmtPatch = iso => {
  const m = /^(\d{4})-(\d{2})/.exec(iso || "");
  if(!m) return iso || "";
  return new Date(+m[1], +m[2]-1, 1).toLocaleDateString(LOCALE[lang], {month:"long", year:"numeric"});
};

/* ---------- carga ---------- */
fetch("builds.json", { cache:"no-cache" })
  .then(r => { if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => { DATA = d; render(); })
  .catch(e => {
    const t = UI[lang];
    document.getElementById("app").innerHTML =
      `<div class="wrap"><div class="err"><b>${t.loadErr}</b><br>${esc(e.message)}<br><br>${t.loadHint}</div></div>`;
  });

document.getElementById("lang").addEventListener("click", ev => {
  const b = ev.target.closest("button[data-l]");
  if(!b) return;
  lang = b.dataset.l;
  try{ localStorage.setItem("lang", lang); }catch(e){}
  if(DATA) render();
});

/* ---------- render ---------- */
function render(){
  const t = UI[lang];
  const s = DATA.site || {};

  document.documentElement.lang = lang;
  document.title = tr(s.title) || "builds";
  document.getElementById("meta-desc").content = tr(s.tagline) || "";
  document.getElementById("brand").innerHTML = esc(tr(s.title) || "builds").replace("/", '<span>/</span>');
  document.getElementById("foot-disclaimer").textContent = t.disclaimer;

  document.querySelectorAll("#lang button").forEach(b =>
    b.setAttribute("aria-pressed", String(b.dataset.l === lang)));

  const contactCfg = DATA.contact || {};
  const showContact = contactCfg.enabled !== false && contactCfg.accessKey;

  document.getElementById("nav").innerHTML = `
    <a href="#builds">${t.navBuilds}</a>
    <a href="#flasheo">${t.navFlash}</a>
    <a href="#creditos">${t.navCredits}</a>
    ${showContact ? `<a href="#contacto">${t.navContact}</a>` : ""}`;

  const devices = (DATA.devices || []).filter(d => d.active !== false);
  if(current >= devices.length) current = 0;
  const d = devices[current];

  const don = s.donate || {};
  const showDonate = don.enabled !== false && don.url && don.url !== "#";

  const coffee = document.getElementById("coffee");
  if (showDonate) {
    coffee.href = don.url;
    coffee.title = tr(don.label);
    coffee.style.display = "";
  } else {
    coffee.style.display = "none";
  }

  const sup = document.getElementById("support");
  sup.innerHTML = showDonate ? `
    ${don.sublabel ? `<h4 class="sup-h">${esc(tr(don.sublabel))}</h4>` : ""}
    ${don.description ? `<p class="sup-desc">${esc(tr(don.description))}</p>` : ""}
    <a class="donate-sm" href="${esc(don.url)}" target="_blank" rel="noopener">☕ ${esc(tr(don.label))}</a>` : "";

  const tabs = devices.length > 1 ? `
    <div class="wrap"><div class="devbar" role="tablist">
      ${devices.map((dev,i) => `<button class="devtab" role="tab" aria-selected="${i===current}" data-i="${i}">${esc(dev.name)}</button>`).join("")}
    </div></div>` : "";

  document.getElementById("app").innerHTML = `
    <div class="hero"><div class="wrap">
      <h1>${esc(tr(s.title))}</h1>
      <p>${esc(tr(s.tagline))}</p>
    </div></div>
    ${tabs}
    <section id="builds"><div class="wrap">
      <h2>${esc(d ? d.name : t.navBuilds)}</h2>
      <p class="sub">${t.buildsSub}</p>
      ${d ? renderMeta(d) : ""}
      ${d && (d.builds || []).length ? d.builds.map(renderBuild).join("") : `<p class="sub">${t.noBuilds}</p>`}
    </div></section>
    ${renderFlashing()}
    ${renderCredits()}
    ${showContact ? renderContact(contactCfg, d) : ""}`;

  document.querySelectorAll(".devtab").forEach(b =>
    b.onclick = () => { current = +b.dataset.i; render(); document.getElementById("builds").scrollIntoView(); });
  document.querySelectorAll(".bhead").forEach(h =>
    h.onclick = () => h.parentElement.classList.toggle("open"));

  if (showContact) wireContactForm();

  const me = (DATA.credits || []).find(c => c.self);
  document.getElementById("foot-credit").textContent = me ? tr(me.role) : "";
}

function renderContact(cfg, d){
  const t = UI[lang];
  const builds = (d && d.builds) || [];
  const buildOpts = builds.map(b => {
    const label = `crDroid ${b.version} · ${fmtDate(b.date)}`;
    return `<option value="${esc(label)}">${esc(label)}</option>`;
  }).join("");

  return `
  <section id="contacto"><div class="wrap">
    <h2>${t.contactTitle}</h2>
    <p class="sub">${t.contactSub}</p>
    <form id="contactForm" class="cform" novalidate>
      <input type="hidden" name="access_key" value="${esc(cfg.accessKey)}">
      <input type="hidden" name="subject" value="Nuevo mensaje desde dvy-jp builds">
      <input type="hidden" name="from_name" value="dvy-jp builds">
      <input type="checkbox" name="botcheck" class="cf-hp" tabindex="-1" autocomplete="off" aria-hidden="true">
      <div class="cf-row">
        <label class="cf-field">
          <span>${t.cType}</span>
          <select name="Tipo">
            <option value="${esc(t.cTypeBug)}">${t.cTypeBug}</option>
            <option value="${esc(t.cTypeGen)}">${t.cTypeGen}</option>
          </select>
        </label>
        <label class="cf-field">
          <span>${t.cBuild}</span>
          <select name="Build">
            ${buildOpts}
            <option value="${esc(t.cBuildNA)}">${t.cBuildNA}</option>
          </select>
        </label>
      </div>
      <label class="cf-field">
        <span>${t.cEmail}</span>
        <input type="email" name="email" autocomplete="email">
        <small class="cf-hint">${t.cEmailHint}</small>
      </label>
      <label class="cf-field">
        <span>${t.cMsg}</span>
        <textarea name="message" required placeholder="${esc(t.cMsgPh)}"></textarea>
      </label>
      <div class="cf-foot">
        <button type="submit" class="cf-send">${t.cSend}</button>
        <span id="cStatus" class="cf-status" role="status" aria-live="polite"></span>
      </div>
    </form>
  </div></section>`;
}

function wireContactForm(){
  const form = document.getElementById("contactForm");
  if(!form || form.dataset.wired) return;
  form.dataset.wired = "1";
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const t = UI[lang];
    const status = document.getElementById("cStatus");
    const btn = form.querySelector(".cf-send");
    if(form.botcheck && form.botcheck.checked) return;           // honeypot
    if(!form.message.value.trim()){ status.className = "cf-status err"; status.textContent = t.cErr; return; }
    btn.disabled = true; btn.textContent = t.cSending;
    status.className = "cf-status"; status.textContent = "";
    try{
      const res = await fetch("https://api.web3forms.com/submit", { method:"POST", body:new FormData(form) });
      const json = await res.json();
      if(json.success){
        form.reset();
        status.className = "cf-status ok"; status.textContent = t.cSent;
      } else throw new Error(json.message || "error");
    }catch(err){
      status.className = "cf-status err"; status.textContent = t.cErr;
    }finally{
      btn.disabled = false; btn.textContent = t.cSend;
    }
  });
}

function renderMeta(d){
  const t = UI[lang];
  const bits = [
    d.codename && `<b>${t.codename}</b> ${esc(d.codename)}`,
    d.model && `<b>${t.model}</b> ${esc(d.model)}`,
    d.soc && `<b>${t.soc}</b> ${esc(d.soc)}`
  ].filter(Boolean);
  return bits.length ? `<div class="devmeta">${bits.join("")}</div>` : "";
}

function renderBuild(b){
  const t = UI[lang];
  const meta = [fmtDate(b.date), b.securityPatch && t.patchOf(fmtPatch(b.securityPatch)), b.size].filter(Boolean).join(" · ");
  const files = [
    b.filename && `<div><span>${esc(b.filename)}</span></div>`,
    b.md5 && `<div><span>MD5</span><span>${esc(b.md5)}</span></div>`
  ].filter(Boolean).join("");
  const links = (b.downloads || []).map(dl => {
    const off = !dl.url || dl.url === "#";
    return `<a class="btn ${dl.primary ? "primary" : ""} ${off ? "off" : ""}" href="${esc(dl.url || "#")}" ${off ? "" : 'target="_blank" rel="noopener"'}>${esc(tr(dl.label))}</a>`;
  }).join("");
  const notes = tr(b.notes);

  return `
  <article class="build ${b.latest ? "is-latest open" : ""}">
    <div class="bhead">
      <div class="btitle">
        <h3>crDroid ${esc(b.version)}
          ${b.variant ? `<span class="tag variant">${esc(b.variant)}</span>` : ""}
          ${b.latest ? `<span class="tag latest">${t.latest}</span>` : ""}
        </h3>
        <div class="bmeta">Android ${esc(b.android)} · ${esc(meta)}</div>
      </div>
      <div class="chev">▼</div>
    </div>
    <div class="bbody">
      <h4>${t.changes}</h4>
      <ul>${trArr(b.changelog).map(c => `<li>${esc(c)}</li>`).join("")}</ul>
      ${notes ? `<h4>${t.notes}</h4><ul><li>${esc(notes)}</li></ul>` : ""}
      ${files ? `<h4>${t.file}</h4><div class="files">${files}</div>` : ""}
      <div class="dl">${links}</div>
    </div>
  </article>`;
}

function renderFlashing(){
  const t = UI[lang], f = DATA.flashing;
  if(!f) return "";
  const reqs = trArr(f.requirements);
  return `
  <section id="flasheo"><div class="wrap">
    <h2>${t.flashTitle}</h2>
    <p class="sub">${t.flashSub}</p>
    ${f.warning ? `<div class="warn"><span>⚠️</span><div><b>${t.warnLead}</b> ${esc(tr(f.warning))}</div></div>` : ""}
    ${reqs.length ? `
      <div class="panel">
        <h3>${t.reqTitle}</h3><p class="psub">${t.reqSub}</p>
        <ul class="reqs">${reqs.map(r => `<li>${esc(r)}</li>`).join("")}</ul>
      </div>` : ""}
    ${(f.procedures || []).map(p => `
      <div class="panel">
        <h3>${esc(tr(p.title))}</h3>
        <p class="psub">${esc(tr(p.subtitle))}</p>
        <ol class="steps">${trArr(p.steps).map(st => `<li>${rich(st)}</li>`).join("")}</ol>
        ${p.note ? `<div class="pnote">${rich(tr(p.note))}</div>` : ""}
      </div>`).join("")}
    ${(f.troubleshooting || []).length ? `
      <div class="panel">
        <h3>${t.tsTitle}</h3><p class="psub">${t.tsSub}</p>
        ${f.troubleshooting.map(x => `<div class="tsp"><b>${esc(tr(x.problem))}</b><p>${esc(tr(x.solution))}</p></div>`).join("")}
      </div>` : ""}
  </div></section>`;
}

function renderCredits(){
  const t = UI[lang], c = DATA.credits || [];
  if(!c.length) return "";
  return `
  <section id="creditos"><div class="wrap">
    <h2>${t.credTitle}</h2>
    <p class="sub">${t.credSub}</p>
    ${c.map(x => `
      <div class="cred"><div>
        <b>${x.url ? `<a href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.name)}</a>` : esc(x.name)}</b>
        <p>${esc(tr(x.role))}</p>
      </div></div>`).join("")}
  </div></section>`;
}
</script>
</body>
</html>
